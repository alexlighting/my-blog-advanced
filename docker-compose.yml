version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: blog_postgres_advanced
    environment:
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpassword
      POSTGRES_DB: blogdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloguser -d blogdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: mypassword
      REDIS_DATABASES: 16
      REDIS_MAXMEMORY: 512mb
      REDIS_APPENDONLY: "yes"

  # Опциональный веб-интерфейс для управления БД
  adminer:
    image: adminer:latest
    container_name: blog_adminer_advanced
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
    name: blog_postgres_data

  redis_data:
    name: redis_data
